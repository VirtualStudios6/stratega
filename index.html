<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logos/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#080810" />
    <meta name="description" content="Stratega Planner — Gestiona tu contenido, finanzas y equipo" />
    <title>Stratega Planner</title>
  </head>
  <body>
    <!-- Aplica el color de fondo del tema guardado antes de que React monte.
         Evita el flash negro/blanco en iOS y Android al arrancar la app. -->
    <script>
      (function () {
        var bg = {
          oscuro:      "#080810",
          medianoche:  "#01040F",
          claro:       "#F2F2F7",
          rosa:        "#FFF0F5",
          azul:        "#EEF4FF",
          cafe:        "#FAF5EF",
          menta:       "#F0FBF5",
        };
        var theme = localStorage.getItem("stratega-theme") || "claro";
        document.body.style.backgroundColor = bg[theme] || bg.claro;
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
